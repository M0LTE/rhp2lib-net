# XROUTER.CFG used by RhpV2.Client integration tests.
# Loopback-only; no radio. RHPPORT explicitly enabled on 9000 so the
# Testcontainers test fixture can drive the real RHP server.

DNS=8.8.8.8

NODECALL=G9DUM-1
NODEALIAS=DUMMY
CONSOLECALL=G9DUM
CHATCALL=G9DUM-8
CHATALIAS=DUMCHT

# Explicit RHP server port. Without this directive xrouter doesn't open
# the listener on the Linux stack in this dummy config.
RHPPORT=9000

CTEXT
Integration test node.
***

INFOTEXT
RhpV2.Client integration tests.
***

IDTEXT
!5824.22N/00515.00W Test Router (DUMMY)
***

INTERFACE=1
	TYPE=LOOPBACK
	PROTOCOL=KISS
	MTU=256
ENDINTERFACE

PORT=1
	ID="Loopback port"
	INTERFACENUM=1
ENDPORT
