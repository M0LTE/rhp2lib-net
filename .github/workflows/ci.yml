name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore RhpV2.slnx

      - name: Build
        run: dotnet build RhpV2.slnx --configuration Release --no-restore

      # Unit suite runs on every OS — no external dependencies.
      - name: Test (unit)
        run: >
          dotnet test tests/RhpV2.Client.Tests/RhpV2.Client.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results-unit.trx"
          --results-directory ./TestResults

      # Integration suite needs Docker + Linux containers. The hosted
      # ubuntu-latest runner has both; the windows / macOS runners
      # don't run Linux containers, so skip the project there. The
      # fixtures fail loudly on missing Docker by design — there's no
      # silent skip — so we gate at the workflow level instead.
      - name: Test (integration)
        if: runner.os == 'Linux'
        run: >
          dotnet test tests/RhpV2.Client.IntegrationTests/RhpV2.Client.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results-integration.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults/**/*.trx
          if-no-files-found: warn
